<!-- Reusable SEO head snippet template for localized pages.
Replace {lang}, {url}, {title}, {description}, and social metadata per locale. -->
<link rel="canonical" href="{url}" />
<meta name="robots" content="index,follow,max-image-preview:large" />
<link rel="alternate" hreflang="tr" href="https://www.safaktour.com/tr/" />
<link rel="alternate" hreflang="en" href="https://www.safaktour.com/en/" />
<link rel="alternate" hreflang="ar" href="https://www.safaktour.com/ar/" />
<link rel="alternate" hreflang="x-default" href="https://www.safaktour.com/en/" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Şafak Tour" />
<meta property="og:title" content="{title}" />
<meta property="og:description" content="{description}" />
<meta property="og:url" content="{url}" />
<meta property="og:image" content="https://www.safaktour.com/assets/images/safak-tour-logo.svg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{title}" />
<meta name="twitter:description" content="{description}" />
<meta name="twitter:image" content="https://www.safaktour.com/assets/images/safak-tour-logo.svg" />
